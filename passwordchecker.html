<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Password Strength Checker</title>
    <link rel="stylesheet" href="passwordchecker.css">
</head>
<body>
    <div class="container">
        <h2>Password Strength Checker</h2>
        <div class="input-group">
            <input type="password" id="password" placeholder="Enter your password">
            <span id="toggle">Show</span>
        </div>
        
        <div class="strength-meter">
            <div id="strength-bar"></div>
        </div>
        <p id="msg">Strength: <span id="strength-text">Empty</span></p>
        
        <ul class="requirements">
            <li id="length">At least 8 characters</li>
            <li id="upper">At least one uppercase letter</li>
            <li id="number">At least one number</li>
            <li id="special">At least one special character</li>
        </ul>
    </div>
    <script src="passwordchecker.js"></script>
</body>
</html>
